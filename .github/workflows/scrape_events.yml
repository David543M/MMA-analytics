name: Scrape UFC Events

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

concurrency:
  group: scrape-ufc-events
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape-events:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show runtime
        run: |
          echo "Python: $(python --version)"
          echo "Pip: $(pip --version)"

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing SUPABASE_URL secret"
            exit 1
          fi
          if [ -z "$SUPABASE_KEY" ]; then
            echo "Missing SUPABASE_KEY secret"
            exit 1
          fi
          echo "Supabase URL: ${SUPABASE_URL}"
          echo "Service role key: present"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/requirements.txt

      - name: Scrape UFC events
        run: |
          echo "Starting UFC event scrape..."
          python -u .github/workflows/scrape_events.py
          echo "UFC event scrape completed successfully."
